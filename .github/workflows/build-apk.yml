name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate Android launcher icons
        run: |
          ICON_SRC="public/app-icon-source.png"
          MIPMAP_BASE="android/app/src/main/res"

          gen() {
            local DPI=$1 SIZE=$2
            local FG_SIZE=$(( SIZE * 3 / 2 ))
            local DIR="${MIPMAP_BASE}/mipmap-${DPI}"
            mkdir -p "$DIR"
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher.png"
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" "$DIR/ic_launcher_round.png"
            convert -size "${FG_SIZE}x${FG_SIZE}" xc:none \
              \( "$ICON_SRC" -resize "${SIZE}x${SIZE}" \) \
              -gravity center -composite "$DIR/ic_launcher_foreground.png"
          }

          gen mdpi    48
          gen hdpi    72
          gen xhdpi   96
          gen xxhdpi  144
          gen xxxhdpi 192

      - name: Sync to Android
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dailydabba-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
